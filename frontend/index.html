<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lombardi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=Alegreya+Sans:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/graph.css">
    <link rel="stylesheet" href="css/detail.css">
    <link rel="stylesheet" href="css/verification.css">
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
</head>
<body>
    <header class="shell-header">
        <h1 style="cursor:pointer" onclick="navigateTo(null)">Lom<strong>bardi</strong></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar actor, evento..." autocomplete="off">
            <ul id="searchResults" class="search-results" hidden></ul>
        </div>
        <div class="stats-container">
            <button id="statsBar" class="stats-bar" onclick="toggleProcessPanel()"></button>
            <div id="processPanel" class="process-panel" hidden>
                <div class="process-header">
                    <h4 id="processPanelTitle"></h4>
                    <button onclick="toggleProcessPanel()" class="detail-close">&times;</button>
                </div>
                <div class="process-bar-container">
                    <div class="process-bar" id="processBar"></div>
                </div>
                <div id="processDetails" class="process-details"></div>
                <div class="process-section-divider"></div>
                <div id="graphHealthDetails" class="process-details"></div>
                <div class="process-actions">
                    <button id="fetchRssBtn" class="ingest-btn" onclick="fetchNewRSS()">
                        <i data-feather="rss"></i> <span id="fetchRssLabel"></span>
                    </button>
                    <button id="pruneBtn" class="ingest-btn" onclick="pruneGraph()">
                        <i data-feather="scissors"></i> <span id="pruneBtnLabel"></span>
                    </button>
                    <button class="ingest-btn" onclick="toggleConsole()">
                        <i data-feather="terminal"></i> <span id="consoleBtnLabel"></span>
                    </button>
                </div>
            </div>
        </div>
        <button class="console-toggle" id="consoleToggleBtn" onclick="toggleConsole()"><i data-feather="terminal"></i></button>
        <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()"><i data-feather="sun"></i></button>
        <button id="langToggle" class="lang-toggle" onclick="toggleLang()">ES</button>
    </header>

    <main class="split-view">
        <div class="split-left" id="graphPanel">
            <div class="graph-toolbar">
                <button id="territoryToggle" class="view-toggle" onclick="toggleTerritory()" title="Territorio"><i data-feather="globe"></i></button>
                <button id="viewTitles" class="view-toggle active" onclick="setView('titles')"></button>
                <button id="viewNodes" class="view-toggle" onclick="setView('nodes')"></button>
                <div class="degree-control">
                    <label id="degreeLabel"></label>
                    <button class="degree-btn active" data-deg="1" onclick="setDegree(1)">1</button>
                    <button class="degree-btn" data-deg="2" onclick="setDegree(2)">2</button>
                    <button class="degree-btn" data-deg="3" onclick="setDegree(3)">3</button>
                </div>
            </div>
            <svg id="graph"></svg>
            <button id="disputeToggle" class="dispute-toggle" onclick="toggleDispute()" title="Controversias">
                <i data-feather="zap-off"></i>
            </button>
            <div id="timelineBar" class="timeline-bar" hidden></div>
            <nav id="breadcrumbs" class="breadcrumbs"></nav>
        </div>
        <div class="split-handle" id="splitHandle"></div>
        <div class="split-right" id="detailPanel">
            <div class="right-tabs">
                <button id="tabFeed" class="right-tab active" onclick="switchRightTab('feed')"></button>
                <button id="tabNode" class="right-tab" onclick="switchRightTab('node')"></button>
                <button id="tabSources" class="right-tab" onclick="switchRightTab('sources')"></button>
            </div>
            <div id="rightNodePanel" class="right-panel-content" hidden>
                <div class="detail-empty">
                    <p id="detailEmptyMsg"></p>
                </div>
                <div class="detail-content" id="detailContent" hidden>
                    <div id="detailBody"></div>
                </div>
            </div>
            <div id="rightFeedPanel" class="right-panel-content">
                <div class="feed-controls">
                    <select id="feedSort" onchange="changeFeedSort(this.value)">
                        <option id="feedSortDate" value="date"></option>
                        <option id="feedSortRelevance" value="relevance"></option>
                    </select>
                </div>
                <div id="newsFeed" class="news-feed"></div>
                <button id="loadMoreBtn" class="load-more-btn" onclick="loadMoreFeed()" hidden></button>
            </div>
            <div id="rightSourcesPanel" class="right-panel-content" hidden>
                <div class="sources-panel">
                    <div class="sources-section">
                        <div class="sources-section-header">
                            <h3 id="sourcesTopicsTitle"></h3>
                        </div>
                        <p class="sources-hint" id="sourcesTopicsHint"></p>
                        <div id="topicsList" class="topics-list"></div>
                        <div class="topic-add-row">
                            <input type="text" id="topicInput" class="alias-input" placeholder="" onkeydown="if(event.key==='Enter')addTopic()">
                            <button class="alias-add-btn" onclick="addTopic()">+</button>
                        </div>
                    </div>
                    <div class="sources-section sources-feeds-section">
                        <div class="sources-section-header">
                            <h3 id="sourcesFeedsTitle"></h3>
                            <div class="sources-header-right">
                                <span id="sourcesCount" class="sources-count"></span>
                                <button id="addFeedBtn" class="action-btn" onclick="toggleAddFeedForm()">
                                    <i data-feather="plus"></i> <span id="addFeedLabel"></span>
                                </button>
                            </div>
                        </div>
                        <div id="addFeedForm" class="add-feed-form" hidden>
                            <input type="text" id="newFeedName" class="alias-input" placeholder="">
                            <input type="text" id="newFeedUrl" class="alias-input" placeholder="">
                            <div class="add-feed-row-inline">
                                <input type="text" id="newFeedLang" class="alias-input" placeholder="">
                                <input type="text" id="newFeedRegion" class="alias-input" placeholder="">
                            </div>
                            <div class="add-feed-actions">
                                <button class="action-btn primary" onclick="saveFeed()"><span id="saveFeedLabel"></span></button>
                                <button class="action-btn" onclick="toggleAddFeedForm()"><span id="cancelFeedLabel"></span></button>
                            </div>
                        </div>
                        <div id="feedsList" class="feeds-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Console drawer -->
    <div id="consoleDrawer" class="console-drawer" hidden>
        <div class="console-header">
            <h4 id="consoleTitle"></h4>
            <button onclick="toggleConsole()" class="detail-close">&times;</button>
        </div>
        <div id="consoleOutput" class="console-output"></div>
    </div>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="i18n.js"></script>
    <script src="timeline.js"></script>
    <script src="verification.js"></script>
    <script src="app.js"></script>
</body>
</html>
